<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Digital Time Capsule - Sign-Up</title>
        <link rel="stylesheet" href="/css/styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="icon" href="./assets/images/Time-capsule-logo.png" type="image/x-icon">
    </head>
    <body class="auth-page">
        <div id="transition-overlay" class="transition-overlay" style="opacity: 0; pointer-events: none;"></div>
        <header class="header">
            <nav class="nav-container">
                <div class="logo">
                    <i class="fas fa-capsules"></i>
                    <span>TimeCapsule</span>
                </div>
                <div class="nav-links">
                    
                    <a href="#" onclick="navigateWithMatrixTransition('login.html'); sessionStorage.setItem('fromTransition', 'true'); return false;" class="nav-link">Login</a>
                </div>
            </nav>
        </header>
        <main class="auth-main">
            <div class="auth-container">
                <fieldset>
                    <form class="sign-up-form" onsubmit="handleSignUpWithTransition(event)">
                        <h3>Sign-Up</h3>
                        <label for="username">Username</label>
                        <input type="text" name="username" id="username" placeholder="Enter your Username" required>
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder="Enter your Email" required>
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" placeholder="Enter your Password" required>
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" name="confirm-password" id="confirm-password" placeholder="Confirm Password" required>
                        
                        <!-- Terms and Conditions Checkbox -->
                        <div class="checkbox-container" style="display: flex; align-items: center; gap: 10px; margin: 15px 0; padding: 10px; background: var(--dark-bg-primary); border-radius: 8px;">
                            <input type="checkbox" id="terms-checkbox" name="terms" required style="width: 18px; height: 18px; cursor: pointer;">
                            <label for="terms-checkbox" style="color: var(--dark-text-secondary); font-size: 0.9rem; cursor: pointer;">
                                I have read and agree to the 
                                <a href="https://www.termsfeed.com/live/e08066e3-01b1-42a9-b02a-b82a14f2c48a" target="_blank" style="color: var(--dark-accent-primary);">Privacy Policy</a> 
                                and 
                                <a href="https://www.termsfeed.com/live/b3a0a3fc-7a9e-4487-b080-09ffd1bbfd40" target="_blank" style="color: var(--dark-accent-primary);">Terms of Service</a>
                            </label>
                        </div>
                        
                        <p id="error"></p>
                        <button id="Sign-Up-Btn" type="submit">Sign-Up</button>
                        <div class="auth-links">
                            <p>Already have an account?</p>
                            <a href="#" onclick="navigateWithMatrixTransition('login.html'); sessionStorage.setItem('fromTransition', 'true'); return false;">Login</a>
                        </div>
                    </form>
                </fieldset>
            </div>
        </main>
        <script src="../js/utils.js"></script>
        <script src="../js/storage.js"></script>
        <script src="../js/auth.js"></script>
        <script src="../js/users.js"></script>
        <script src="../js/capsules.js"></script>
        <script src="../js/banSystem.js"></script>
        <script src="../js/admin.js"></script>
        <script src="../js/ui.js"></script>
        <script src="../js/app.js"></script>
        <script src="../js/transition.js"></script>
    </body>
</html>
